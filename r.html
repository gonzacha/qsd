<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QSD Reader — Qué Se Dice</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="Logo_qsd.png">
  <link rel="apple-touch-icon" href="Logo_qsd.png">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;900&family=Libre+Baskerville:wght@400;700&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-deep: #080a12;
      --bg-primary: #0b0e1a;
      --bg-card: #111627;
      --bg-elevated: #1a2040;
      --gold-primary: #c9953a;
      --gold-light: #e4b65c;
      --text-primary: #e8e4dc;
      --text-secondary: #9a968e;
      --text-muted: #5c5850;
      --border-subtle: rgba(201, 149, 58, 0.15);
      --font-display: 'Playfair Display', Georgia, serif;
      --font-headline: 'Libre Baskerville', Georgia, serif;
      --font-body: 'Source Sans 3', 'Segoe UI', sans-serif;
      --space-sm: 0.5rem;
      --space-md: 1rem;
      --space-lg: 1.5rem;
      --space-xl: 2rem;
      --space-2xl: 3rem;
      --max-width: 720px;
      --header-height: 64px;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: calc(var(--space-xl) + var(--header-height)) var(--space-md) var(--space-2xl);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 0%, rgba(201, 149, 58, 0.04) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 100%, rgba(62, 124, 196, 0.03) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    .reader-header {
      width: 100%;
      max-width: var(--max-width);
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      position: fixed;
      top: var(--space-md);
      left: 50%;
      transform: translateX(-50%);
      padding: 0.35rem 0.9rem;
      border-radius: 999px;
      background: rgba(11, 14, 26, 0.7);
      border: 1px solid rgba(201, 149, 58, 0.12);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      margin-bottom: var(--space-xl);
      z-index: 10;
    }

    .reader-logo {
      display: inline-flex;
      align-items: center;
      gap: var(--space-sm);
      text-decoration: none;
      color: var(--text-primary);
      font-family: var(--font-headline);
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .reader-logo img {
      width: 40px;
      height: auto;
      filter: drop-shadow(0 4px 10px rgba(201, 149, 58, 0.3));
    }

    .reader-shell {
      width: 100%;
      max-width: var(--max-width);
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 18px;
      padding: var(--space-2xl) var(--space-xl);
      position: relative;
      z-index: 1;
    }

    .reader-hero {
      width: 100%;
      margin: var(--space-lg) 0;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(201, 149, 58, 0.12);
    }

    .reader-hero img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
    }

    .source-label {
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: var(--space-sm);
    }

    .source-name {
      font-family: var(--font-headline);
      font-size: 1rem;
      color: var(--gold-light);
      margin-bottom: var(--space-md);
    }

    .reader-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      line-height: 1.2;
      margin-bottom: var(--space-md);
    }

    .reader-meta {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-bottom: var(--space-lg);
    }

    .reader-snippet {
      font-size: 1rem;
      color: var(--text-primary);
      margin-bottom: var(--space-xl);
    }

    .brand-plate {
      border: 1px solid var(--border-subtle);
      border-radius: 14px;
      padding: var(--space-lg);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: linear-gradient(135deg, rgba(201, 149, 58, 0.08), rgba(17, 22, 39, 0.8));
      margin-bottom: var(--space-xl);
    }

    .sponsor-banner {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .sponsor-banner img {
      width: 100%;
      max-width: 100%;
      height: auto;
      border-radius: inherit;
      object-fit: contain;
    }

    .sponsor-label {
      display: inline-block;
      font-size: 0.52rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(233, 237, 248, 0.6);
      border: 1px solid rgba(233, 237, 248, 0.18);
      padding: 0.25rem 0.6rem;
      border-radius: 999px;
      margin-bottom: var(--space-sm);
      align-self: flex-start;
    }

    .brand-kicker {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: var(--space-sm);
    }

    .brand-title {
      font-family: var(--font-display);
      font-size: 1.4rem;
      color: var(--text-primary);
    }

    .cta-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 0.9rem 1.2rem;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #0b0e1a;
      background: linear-gradient(135deg, var(--gold-primary), var(--gold-light));
      border-radius: 999px;
      text-decoration: none;
      box-shadow: 0 10px 20px rgba(201, 149, 58, 0.25);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .cta-link:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 24px rgba(201, 149, 58, 0.3);
    }

    .cta-link[aria-disabled="true"] {
      opacity: 0.5;
      pointer-events: none;
      box-shadow: none;
    }

    @media (max-width: 540px) {
      body {
        padding: var(--space-lg) var(--space-md) var(--space-xl);
      }

      .reader-header {
        top: var(--space-sm);
        padding: 0.3rem 0.75rem;
      }

      .reader-logo {
        font-size: 0.85rem;
        letter-spacing: 0.06em;
      }

      .reader-logo img {
        width: 32px;
      }

      .reader-shell {
        padding: var(--space-xl) var(--space-lg);
      }
    }
  </style>
</head>
<body>
  <header class="reader-header">
    <a class="reader-logo" href="/">
      <img src="Logo_qsd.png" alt="Qué Se Dice">
      Qué Se Dice
    </a>
  </header>

  <main class="reader-shell">
    <div class="source-label">FUENTE ORIGINAL</div>
    <div class="source-name" id="sourceName">Fuente externa</div>
    <div class="reader-hero" id="heroWrap" hidden>
      <img id="heroImage" alt="" loading="lazy" decoding="async">
    </div>
    <h1 class="reader-title" id="title">Título no disponible</h1>
    <div class="reader-meta" id="timestamp" hidden></div>
    <p class="reader-snippet" id="snippet" hidden></p>

    <div class="brand-plate">
      <div class="sponsor-label">Patrocinado</div>
      <div class="sponsor-banner">
        <img
          src="adds/gob-corrientes-banner.webp"
          alt="Gobierno de Corrientes - Siempre cerca"
          loading="lazy"
        />
      </div>
    </div>

    <a class="cta-link" id="sourceLink" href="#" target="_blank" rel="noopener noreferrer" aria-disabled="true">
      LEER FUENTE ORIGINAL
    </a>
  </main>

  <script src="/lib/resolve-story-image.js"></script>
  <script>
    function timeAgo(dateStr) {
      if (!dateStr) return '';
      const now = new Date();
      const date = new Date(dateStr);
      if (Number.isNaN(date.getTime())) return '';
      const diffMs = now - date;
      const diffMin = Math.floor(diffMs / 60000);
      const diffHr = Math.floor(diffMs / 3600000);
      const diffDay = Math.floor(diffMs / 86400000);

      if (diffMin < 1) return 'Ahora';
      if (diffMin < 60) return `Hace ${diffMin} min`;
      if (diffHr < 24) return `Hace ${diffHr}h`;
      if (diffDay < 7) return `Hace ${diffDay}d`;
      return date.toLocaleDateString('es-AR', { day: 'numeric', month: 'short' });
    }

    const params = new URLSearchParams(window.location.search);
    const url = params.get('u') || '';
    const title = params.get('t') || 'Título no disponible';
    const source = params.get('s') || 'Fuente externa';
    const ts = params.get('ts');
    const snippet = params.get('sn');

    document.getElementById('title').textContent = title;
    document.getElementById('sourceName').textContent = source;

    if (snippet) {
      const snippetEl = document.getElementById('snippet');
      snippetEl.textContent = snippet;
      snippetEl.hidden = false;
    }

    if (ts) {
      const stamp = timeAgo(ts);
      if (stamp) {
        const timestampEl = document.getElementById('timestamp');
        timestampEl.textContent = stamp;
        timestampEl.hidden = false;
      }
    }

    const heroWrap = document.getElementById('heroWrap');
    const heroImage = document.getElementById('heroImage');
    if (heroImage) {
      heroImage.onerror = () => {
        if (heroWrap) heroWrap.hidden = true;
      };
    }

    if (url && typeof window.resolveStoryImage === 'function') {
      window.resolveStoryImage({ url }, { origin: window.location.origin, useProxy: true, timeoutMs: 6000 })
        .then(imageUrl => {
          if (imageUrl && heroImage) {
            heroImage.src = imageUrl;
            heroImage.alt = title;
            if (heroWrap) heroWrap.hidden = false;
          }
        })
        .catch(() => {});
    }

    const linkEl = document.getElementById('sourceLink');
    if (url) {
      try {
        const parsedUrl = new URL(url);
        const isHttp = parsedUrl.protocol === 'http:' || parsedUrl.protocol === 'https:';
        if (isHttp) {
          linkEl.setAttribute('href', parsedUrl.toString());
          linkEl.setAttribute('aria-disabled', 'false');
        }
      } catch (err) {
        // Invalid URL, keep CTA disabled.
      }
    }
  </script>
</body>
</html>
