<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QSD Reader — Qué Se Dice</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="Logo_qsd.png">
  <link rel="apple-touch-icon" href="Logo_qsd.png">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;900&family=Libre+Baskerville:wght@400;700&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-deep: #080a12;
      --bg-primary: #0b0e1a;
      --bg-card: #111627;
      --bg-elevated: #1a2040;
      --gold-primary: #c9953a;
      --gold-light: #e4b65c;
      --text-primary: #e8e4dc;
      --text-secondary: #9a968e;
      --text-muted: #5c5850;
      --border-subtle: rgba(201, 149, 58, 0.15);
      --font-display: 'Playfair Display', Georgia, serif;
      --font-headline: 'Libre Baskerville', Georgia, serif;
      --font-body: 'Source Sans 3', 'Segoe UI', sans-serif;
      --space-sm: 0.5rem;
      --space-md: 1rem;
      --space-lg: 1.5rem;
      --space-xl: 2rem;
      --space-2xl: 3rem;
      --max-width: 720px;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: var(--space-xl) var(--space-md) var(--space-2xl);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 0%, rgba(201, 149, 58, 0.04) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 100%, rgba(62, 124, 196, 0.03) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    .reader-header {
      width: 100%;
      max-width: var(--max-width);
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      margin-bottom: var(--space-xl);
      z-index: 1;
    }

    .reader-logo {
      display: inline-flex;
      align-items: center;
      gap: var(--space-sm);
      text-decoration: none;
      color: var(--text-primary);
      font-family: var(--font-headline);
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .reader-logo img {
      width: 40px;
      height: auto;
      filter: drop-shadow(0 4px 10px rgba(201, 149, 58, 0.3));
    }

    .reader-shell {
      width: 100%;
      max-width: var(--max-width);
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 18px;
      padding: var(--space-2xl) var(--space-xl);
      position: relative;
      z-index: 1;
    }

    .source-label {
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: var(--space-sm);
    }

    .source-name {
      font-family: var(--font-headline);
      font-size: 1rem;
      color: var(--gold-light);
      margin-bottom: var(--space-md);
    }

    .reader-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      line-height: 1.2;
      margin-bottom: var(--space-md);
    }

    .reader-meta {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-bottom: var(--space-lg);
    }

    .reader-snippet {
      font-size: 1rem;
      color: var(--text-primary);
      margin-bottom: var(--space-xl);
    }

    .brand-plate {
      border: 1px solid var(--border-subtle);
      border-radius: 14px;
      padding: var(--space-lg);
      text-align: center;
      background: linear-gradient(135deg, rgba(201, 149, 58, 0.08), rgba(17, 22, 39, 0.8));
      margin-bottom: var(--space-xl);
    }

    .brand-kicker {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: var(--space-sm);
    }

    .brand-title {
      font-family: var(--font-display);
      font-size: 1.4rem;
      color: var(--text-primary);
    }

    .cta-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 0.9rem 1.2rem;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #0b0e1a;
      background: linear-gradient(135deg, var(--gold-primary), var(--gold-light));
      border-radius: 999px;
      text-decoration: none;
      box-shadow: 0 10px 20px rgba(201, 149, 58, 0.25);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .cta-link:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 24px rgba(201, 149, 58, 0.3);
    }

    .cta-link[aria-disabled="true"] {
      opacity: 0.5;
      pointer-events: none;
      box-shadow: none;
    }

    @media (max-width: 540px) {
      body {
        padding: var(--space-lg) var(--space-md) var(--space-xl);
      }

      .reader-shell {
        padding: var(--space-xl) var(--space-lg);
      }
    }
  </style>
</head>
<body>
  <header class="reader-header">
    <a class="reader-logo" href="/">
      <img src="Logo_qsd.png" alt="Qué Se Dice">
      Qué Se Dice
    </a>
  </header>

  <main class="reader-shell">
    <div class="source-label">FUENTE ORIGINAL</div>
    <div class="source-name" id="sourceName">Fuente externa</div>
    <h1 class="reader-title" id="title">Título no disponible</h1>
    <div class="reader-meta" id="timestamp" hidden></div>
    <p class="reader-snippet" id="snippet" hidden></p>

    <div class="brand-plate">
      <div class="brand-kicker">PRESENTA</div>
      <div class="brand-title">Tu marca aquí</div>
    </div>

    <a class="cta-link" id="sourceLink" href="#" target="_blank" rel="noopener noreferrer" aria-disabled="true">
      LEER FUENTE ORIGINAL
    </a>
  </main>

  <script>
    function timeAgo(dateStr) {
      if (!dateStr) return '';
      const now = new Date();
      const date = new Date(dateStr);
      if (Number.isNaN(date.getTime())) return '';
      const diffMs = now - date;
      const diffMin = Math.floor(diffMs / 60000);
      const diffHr = Math.floor(diffMs / 3600000);
      const diffDay = Math.floor(diffMs / 86400000);

      if (diffMin < 1) return 'Ahora';
      if (diffMin < 60) return `Hace ${diffMin} min`;
      if (diffHr < 24) return `Hace ${diffHr}h`;
      if (diffDay < 7) return `Hace ${diffDay}d`;
      return date.toLocaleDateString('es-AR', { day: 'numeric', month: 'short' });
    }

    const params = new URLSearchParams(window.location.search);
    const url = params.get('u') || '';
    const title = params.get('t') || 'Título no disponible';
    const source = params.get('s') || 'Fuente externa';
    const ts = params.get('ts');
    const snippet = params.get('sn');

    document.getElementById('title').textContent = title;
    document.getElementById('sourceName').textContent = source;

    if (snippet) {
      const snippetEl = document.getElementById('snippet');
      snippetEl.textContent = snippet;
      snippetEl.hidden = false;
    }

    if (ts) {
      const stamp = timeAgo(ts);
      if (stamp) {
        const timestampEl = document.getElementById('timestamp');
        timestampEl.textContent = stamp;
        timestampEl.hidden = false;
      }
    }

    const linkEl = document.getElementById('sourceLink');
    if (url) {
      linkEl.setAttribute('href', url);
      linkEl.setAttribute('aria-disabled', 'false');
    }
  </script>
</body>
</html>
