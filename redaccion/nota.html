<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redacción QSD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0c0f1a;
      --bg-card: #121625;
      --text-bright: #f3f4f7;
      --text-primary: #d6d9e2;
      --text-muted: #9aa1b4;
      --border-subtle: rgba(138, 146, 170, 0.18);
      --violet-primary: #6c5ce7;
      --violet-dim: rgba(108, 92, 231, 0.45);
      --max-width: 860px;
      --space-sm: 0.5rem;
      --space-md: 1rem;
      --space-lg: 1.5rem;
      --space-xl: 2rem;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-headline: 'Libre Baskerville', Georgia, serif;
      --font-body: 'Source Sans 3', 'Segoe UI', sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font-body);
      background: var(--bg-primary);
      color: var(--text-primary);
    }
    a { color: inherit; text-decoration: none; }

    .rx-header {
      border-bottom: 1px solid var(--border-subtle);
      padding: var(--space-xl) var(--space-lg) var(--space-lg);
      text-align: center;
    }
    .rx-title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 3rem);
      color: var(--text-bright);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin: 0 0 var(--space-sm);
    }
    .rx-subtitle {
      font-family: var(--font-headline);
      font-size: 0.9rem;
      color: var(--text-muted);
      margin: 0;
    }
    .rx-home {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--violet-dim);
      margin-top: var(--space-md);
    }

    .rx-main {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: var(--space-xl) var(--space-lg) var(--space-xl);
    }

    .rx-hero {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 14px;
      padding: var(--space-lg);
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
    }

    .rx-meta {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-md);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
    }

    .rx-hero-title {
      font-family: var(--font-headline);
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      color: var(--text-bright);
      line-height: 1.3;
      margin: 0;
    }

    .rx-hero-image {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 12px;
      overflow: hidden;
      background: #0f1220;
    }
    .rx-hero-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .rx-body {
      margin-top: var(--space-xl);
      display: flex;
      flex-direction: column;
      gap: var(--space-lg);
    }

    .rx-body p {
      margin: 0;
      font-size: 1rem;
      line-height: 1.7;
      color: var(--text-primary);
    }

    .rx-body h2 {
      font-family: var(--font-headline);
      font-size: 1.15rem;
      letter-spacing: 0.02em;
      color: var(--text-bright);
      margin: 0;
    }

    .rx-quote {
      margin: 0;
      padding: var(--space-md) var(--space-lg);
      border-left: 3px solid var(--violet-primary);
      background: rgba(108, 92, 231, 0.08);
      color: var(--text-bright);
      font-family: var(--font-headline);
      font-size: 1rem;
    }

    .rx-empty {
      text-align: center;
      color: var(--text-muted);
      padding: var(--space-xl);
      border: 1px dashed var(--border-subtle);
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <header class="rx-header">
    <h1 class="rx-title">Redacción QSD</h1>
    <p class="rx-subtitle">Nota editorial</p>
    <a class="rx-home" href="/redaccion">Volver a Redacción</a>
  </header>

  <main class="rx-main">
    <article class="rx-hero" data-article></article>
    <div class="rx-empty" data-empty style="display:none;">No se encontró la nota.</div>
  </main>

  <script>
    const articleEl = document.querySelector('[data-article]');
    const emptyEl = document.querySelector('[data-empty]');

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderBody(blocks) {
      if (!Array.isArray(blocks)) return '';
      return blocks.map((block) => {
        if (!block || !block.type) return '';
        const content = escapeHtml(block.content || '');
        if (block.type === 'subheading') {
          return `<h2>${content}</h2>`;
        }
        if (block.type === 'quote') {
          return `<blockquote class="rx-quote">${content}</blockquote>`;
        }
        return `<p>${content}</p>`;
      }).join('');
    }

    const params = new URLSearchParams(window.location.search);
    const slug = params.get('slug');

    if (!slug) {
      emptyEl.style.display = 'block';
    } else {
      fetch(`/redaccion/${encodeURIComponent(slug)}.json`, { cache: 'no-store' })
        .then((res) => res.ok ? res.json() : null)
        .then((data) => {
          if (!data) {
            emptyEl.style.display = 'block';
            return;
          }
          const imageHtml = data.image ? `
            <div class="rx-hero-image">
              <img src="${escapeHtml(data.image)}" alt="" loading="lazy" decoding="async" />
            </div>
          ` : '';
          const metaParts = [data.category, data.author, data.published_at || data.date].filter(Boolean);

          articleEl.innerHTML = `
            ${imageHtml}
            <div class="rx-meta">${metaParts.map(escapeHtml).join(' · ')}</div>
            <h2 class="rx-hero-title">${escapeHtml(data.title)}</h2>
            ${data.excerpt ? `<p>${escapeHtml(data.excerpt)}</p>` : ''}
            <div class="rx-body">${renderBody(data.body)}</div>
          `;
        })
        .catch(() => {
          emptyEl.style.display = 'block';
        });
    }
  </script>
</body>
</html>
